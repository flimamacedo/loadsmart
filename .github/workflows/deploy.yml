# Build the Docker image, push to ECR (SHA tag; ECR is IMMUTABLE), and redeploy via terraform apply.
# Improvement: switch to GitHub OIDC + role-to-assume (see sre-api/README.md).
name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "sre-api/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_WORKSPACE: ${{ vars.TF_WORKSPACE || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: sre-api/terraform
        run: terraform init

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR repository URL
        id: tf
        working-directory: sre-api/terraform
        run: echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker buildx build --platform linux/amd64 \
            -t "${{ steps.tf.outputs.ecr_url }}:${{ github.sha }}" \
            --push \
            sre-api/

      - name: Terraform apply (replace EC2 with new image)
        working-directory: sre-api/terraform
        env:
          TF_VAR_api_basic_user:            ${{ secrets.API_BASIC_USER }}
          TF_VAR_api_basic_password:        ${{ secrets.API_BASIC_PASSWORD }}
          TF_VAR_ecr_aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_ecr_aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_create_iam:                "false"
        run: |
          terraform apply -auto-approve \
            -var="container_tag=${{ github.sha }}"

      - name: Wait for instance refresh to complete
        working-directory: sre-api/terraform
        run: |
          ASG=$(terraform output -raw asg_name)
          echo "Waiting for instance refresh on $ASG..."
          aws autoscaling wait instance-refresh-in-progress-removed \
            --auto-scaling-group-name "$ASG"
          STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG" \
            --query 'InstanceRefreshes[0].Status' --output text)
          echo "Instance refresh status: $STATUS"
          [ "$STATUS" = "Successful" ]
